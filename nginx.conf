server {
    listen 80;
    server_name localhost;
    root /var/www/public;
    index index.php index.html;

    # Uploads & Assets (Tuned for large agricultural images)
    client_max_body_size 64M;
    client_body_buffer_size 1M;

    # Frontend
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API Proxy
    location /api {
        include fastcgi_params;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/public;
        
        # Robust PATH_INFO handling for Laravel 11
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        
        # Increased timeouts for image processing on Free tier
        fastcgi_read_timeout 300s;
        fastcgi_send_timeout 300s;
        
        # Optimization for Laravel
        fastcgi_param HTTP_PROXY ""; 
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # Static uploads serving
    location /uploads {
        alias /var/www/public/uploads;
        add_header Cache-Control "public, max-age=2592000";
    }

    # Error handling
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}


