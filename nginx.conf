server {
    listen 80;
    server_name localhost;
    
    # --- Frontend Configuration ---
    root /var/www/frontend;
    index index.html;

    # Standard MIME types are critical to prevent "download" issues
    include /etc/nginx/mime.types;
    default_type text/html;

    # Uploads & Assets (Tuned for large agricultural images)
    client_max_body_size 64M;
    client_body_buffer_size 1M;

    # Frontend SPA Support
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Backend API Proxy ---
    location /api {
        include fastcgi_params;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        
        # Point to the specific backend public folder
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/backend/public;
        
        # Robust PATH_INFO handling for Laravel 11
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        
        # Increased timeouts for image processing on Free tier
        fastcgi_read_timeout 300s;
        fastcgi_send_timeout 300s;
        
        # Optimization for Laravel
        fastcgi_param HTTP_PROXY ""; 
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # --- Static Uploads Serving ---
    location /uploads {
        # Point to the backend's persistent uploads folder
        alias /var/www/backend/public/uploads;
        add_header Cache-Control "public, max-age=2592000";
    }

    # Error handling
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}



